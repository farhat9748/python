{% extends "base.html" %}

{% block title %}Login | StudentHub{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card glow-border mt-5">
                <div class="card-header text-center py-4" style="background: var(--gradient-1);">
                    <i class="bi bi-box-arrow-in-right mb-2" style="font-size:2rem; color:white;"></i>
                    <h3 class="mb-0 text-white fw-bold">Welcome Back</h3>
                </div>
                <div class="card-body p-4 p-md-5">
                    
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-4">
                            <label class="form-label" for="username">Username</label>
                            <input type="text" class="form-control" name="username" id="username" placeholder="Enter your username" required autofocus>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label" for="password">Password</label>
                            <input type="password" class="form-control" name="password" id="password" placeholder="Enter your password" required>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-accent btn-lg fw-bold">
                                Login
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p style="color:var(--text-muted); font-size:0.9rem;">
                            Don't have an account? <a href="{{ url_for('register') }}" style="color:var(--accent); text-decoration:none; font-weight:600;">Register here</a>
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
