{% extends "base.html" %}

{% block title %}Add Student | StudentHub{% endblock %}

{% block content %}

<div class="fade-in">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card glow-border">

                <div class="card-header" style="background: linear-gradient(135deg, #059669, #34d399);">
                    <i class="bi bi-person-plus-fill me-2"></i>
                    Add New Student
                </div>

                <div class="card-body">

                    <form method="POST" action="/add" id="add-student-form">

                        <div class="row g-4">

                            <!-- Full Name -->
                            <div class="col-md-6">
                                <label class="form-label" for="name">Full Name</label>
                                <input type="text"
                                       class="form-control"
                                       name="name"
                                       id="name"
                                       placeholder="Enter full name"
                                       required>
                            </div>

                            <!-- Age -->
                            <div class="col-md-6">
                                <label class="form-label" for="age">Age</label>
                                <input type="number"
                                       class="form-control"
                                       name="age"
                                       id="age"
                                       placeholder="Enter age"
                                       min="1"
                                       max="120"
                                       required>
                            </div>

                            <!-- Gender -->
                            <div class="col-md-6">
                                <label class="form-label" for="gender">Gender</label>
                                <select class="form-select"
                                        name="gender"
                                        id="gender"
                                        required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <!-- Course -->
                            <div class="col-md-6">
                                <label class="form-label" for="course">Course</label>
                                <input type="text"
                                       class="form-control"
                                       name="course"
                                       id="course"
                                       placeholder="Enter course name"
                                       required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label" for="email">Email Address</label>
                                <input type="email"
                                       class="form-control"
                                       name="email"
                                       id="email"
                                       placeholder="Enter email address">
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6">
                                <label class="form-label" for="phone">Phone Number</label>
                                <input type="text"
                                       class="form-control"
                                       name="phone"
                                       id="phone"
                                       placeholder="Enter phone number">
                            </div>

                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-between mt-4 pt-3" style="border-top: 1px solid var(--border-color);">

                            <a href="/" class="btn btn-secondary-glass" id="back-btn">
                                <i class="bi bi-arrow-left me-1"></i>
                                Back
                            </a>

                            <button type="submit" class="btn btn-success-glow" id="save-btn">
                                <i class="bi bi-check-circle-fill me-1"></i>
                                Save Student
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
