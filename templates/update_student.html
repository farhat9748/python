{% extends "base.html" %}

{% block title %}Update Student | StudentHub{% endblock %}

{% block content %}

<div class="fade-in">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card glow-border">

                <div class="card-header">
                    <i class="bi bi-pencil-square me-2"></i>
                    Update Student — {{ student.name }}
                </div>

                <div class="card-body">

                    <form method="POST" id="update-student-form">

                        <div class="row g-4">

                            <!-- Full Name -->
                            <div class="col-md-6">
                                <label class="form-label" for="name">Full Name</label>
                                <input type="text"
                                       class="form-control"
                                       name="name"
                                       id="name"
                                       value="{{ student.name }}"
                                       required>
                            </div>

                            <!-- Age -->
                            <div class="col-md-6">
                                <label class="form-label" for="age">Age</label>
                                <input type="number"
                                       class="form-control"
                                       name="age"
                                       id="age"
                                       value="{{ student.age }}"
                                       min="1"
                                       max="120"
                                       required>
                            </div>

                            <!-- Gender -->
                            <div class="col-md-6">
                                <label class="form-label" for="gender">Gender</label>
                                <select class="form-select"
                                        name="gender"
                                        id="gender"
                                        required>
                                    <option value="Male" {% if student.gender == "Male" %}selected{% endif %}>Male</option>
                                    <option value="Female" {% if student.gender == "Female" %}selected{% endif %}>Female</option>
                                    <option value="Other" {% if student.gender == "Other" %}selected{% endif %}>Other</option>
                                </select>
                            </div>

                            <!-- Course -->
                            <div class="col-md-6">
                                <label class="form-label" for="course">Course</label>
                                <input type="text"
                                       class="form-control"
                                       name="course"
                                       id="course"
                                       value="{{ student.course }}"
                                       required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label" for="email">Email Address</label>
                                <input type="email"
                                       class="form-control"
                                       name="email"
                                       id="email"
                                       value="{{ student.email }}">
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6">
                                <label class="form-label" for="phone">Phone Number</label>
                                <input type="text"
                                       class="form-control"
                                       name="phone"
                                       id="phone"
                                       value="{{ student.phone }}">
                            </div>

                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-between mt-4 pt-3" style="border-top: 1px solid var(--border-color);">

                            <a href="/students" class="btn btn-secondary-glass" id="cancel-btn">
                                <i class="bi bi-arrow-left me-1"></i>
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-accent" id="update-btn">
                                <i class="bi bi-check-circle-fill me-1"></i>
                                Update Student
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
